name: Muse
options:
  bundleIdPrefix: com.brianmunroe
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  Muse:
    type: application
    platform: iOS
    sources:
      - path: Muse
    settings:
      base:
        INFOPLIST_FILE: Muse/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.brianmunroe.Muse
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: Supabase
    info:
      path: Muse/App/Info.plist
      properties:
        CFBundleName: Muse
        CFBundleDisplayName: Muse
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIAppFonts:
          - InstrumentSerif-Regular.ttf
          - InstrumentSerif-Italic.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        SUPABASE_URL: "YOUR_SUPABASE_URL"
        SUPABASE_ANON_KEY: "YOUR_SUPABASE_ANON_KEY"

schemes:
  Muse:
    build:
      targets:
        Muse: all
    run:
      config: Debug
