<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muse — Glass Detail Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="phone" id="phone">
    <!-- Two stacked gradient layers so we can crossfade between them -->
    <div class="ambient" id="ambientA"></div>
    <div class="ambient" id="ambientB"></div>

    <header class="topbar">
      <button class="icon-btn" id="prevBtn" aria-label="Previous photo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
      </button>
      <span class="counter" id="counter">1 of 5</span>
      <button class="icon-btn" id="closeBtn" aria-label="Close">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 1l10 10M11 1L1 11"/></svg>
      </button>
    </header>

    <section class="photo-stage" id="photoStage">
      <img class="photo" id="photo" alt="Saved inspiration" crossorigin="anonymous" />
    </section>

    <section class="glass-card" id="glassCard">
      <div class="tags" id="tags"></div>
      <p class="description" id="description"></p>
      <label class="notes">
        <span class="notes-label">Your notes</span>
        <textarea class="notes-field" id="notesField" rows="2" placeholder="Add a note…"></textarea>
      </label>
      <p class="source" id="source"></p>
    </section>
  </main>

  <p class="hint">Swipe, use arrow keys, or tap the arrows to browse</p>

  <script src="app.js"></script>
</body>
</html>
